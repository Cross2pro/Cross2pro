  </text>
  <text x="40" y="150" fill="#8B949E" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18">
    Add the METRICS_TOKEN secret, then run the "Generate GitHub Metrics" workflow once.
  </text>
  <text x="40" y="186" fill="#58A6FF" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="600">
