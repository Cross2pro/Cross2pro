name: GitHub Profile Summary Cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.SUMMARY_GITHUB_TOKEN || secrets.METRICS_TOKEN || github.token }}
        with:
          USERNAME: Cross2pro
          BRANCH_NAME: main
          UTC_OFFSET: 8
          AUTO_PUSH: true
          THEME: transparent
